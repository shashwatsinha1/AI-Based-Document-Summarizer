<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMind | AI Document Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #6366f1, #a855f7, #ec4899);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .gradient-text {
            background: linear-gradient(90deg, #4f46e5, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Navigation -->
        <nav class="glass rounded-3xl p-6 mb-8 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-800">Doc<span class="text-indigo-600">Mind</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 px-4 py-2 bg-emerald-50 rounded-full">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full status-pulse"></div>
                    <span class="text-xs font-bold text-emerald-600 uppercase tracking-widest">AI Engine Ready</span>
                </div>
            </div>
        </nav>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <!-- Left: Workspace -->
            <div class="xl:col-span-7 space-y-6">
                <div class="glass rounded-[2.5rem] p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold text-slate-800">Workspace</h2>
                        <div class="flex bg-slate-100 p-1 rounded-xl">
                            <button class="px-4 py-1.5 rounded-lg text-sm font-semibold bg-white shadow-sm text-indigo-600">Manual Text</button>
                        </div>
                    </div>

                    <textarea id="text-input" rows="12" class="w-full p-6 bg-slate-50/50 border-2 border-transparent focus:border-indigo-500/20 focus:bg-white rounded-[2rem] transition-all outline-none text-slate-600 leading-relaxed text-lg" placeholder="Drop your knowledge here... (min 50 chars)"></textarea>
                    
                    <div class="mt-8 flex items-center justify-between">
                        <div class="space-y-1">
                            <p class="text-xs font-bold text-slate-400 uppercase ml-1">Summary Length</p>
                            <input type="range" id="num-sentences" min="1" max="10" value="3" class="w-48 h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>
                        <button onclick="analyzeText()" id="analyze-btn" class="group relative px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-xl shadow-indigo-200">
                            <span id="btn-text">Generate Insights</span>
                        </button>
                    </div>
                </div>

                <!-- Upload Zone -->
                <div class="glass rounded-[2rem] p-8 border-2 border-dashed border-indigo-200 hover:border-indigo-400 transition-all cursor-pointer group text-center" onclick="document.getElementById('file-input').click()">
                    <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    </div>
                    <p class="text-slate-700 font-bold">Import Document</p>
                    <p class="text-slate-400 text-sm">PDF or TXT supported (Max 500KB)</p>
                    <input type="file" id="file-input" class="hidden" onchange="uploadFile(this)">
                </div>
            </div>

            <!-- Right: Analytics Panel -->
            <div class="xl:col-span-5 space-y-6">
                <!-- Placeholder -->
                <div id="placeholder" class="glass rounded-[2.5rem] p-12 text-center flex flex-col items-center justify-center h-full min-h-[400px]">
                    <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                        <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">Ready to Process</h3>
                    <p class="text-slate-400 max-w-xs mx-auto">Analyze a document to reveal AI summaries, sentiment scores, and key metrics.</p>
                </div>

                <!-- Results -->
                <div id="results" class="hidden space-y-6">
                    <!-- Summary Card -->
                    <div class="glass rounded-[2.5rem] p-8 bg-gradient-to-br from-white to-indigo-50/30">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="px-3 py-1 bg-indigo-600 text-[10px] font-black text-white uppercase rounded-full">AI Abstract</span>
                        </div>
                        <p id="summary-text" class="text-slate-700 leading-relaxed font-medium italic"></p>
                    </div>

                    <!-- Sentiment & Keywords -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass rounded-3xl p-6">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Sentiment</p>
                            <div id="sentiment-label" class="text-xl font-bold text-indigo-600">Neutral</div>
                        </div>
                        <div class="glass rounded-3xl p-6">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Reading Time</p>
                            <div class="text-xl font-bold text-slate-800"><span id="stat-time">0</span>m</div>
                        </div>
                    </div>

                    <div class="glass rounded-[2rem] p-8">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Key Themes</p>
                        <div id="keywords-list" class="flex flex-wrap gap-2"></div>
                    </div>

                    <!-- Stats -->
                    <div class="glass rounded-[2rem] p-8 flex justify-around items-center">
                        <div class="text-center">
                            <p class="text-2xl font-extrabold text-slate-800" id="stat-words">0</p>
                            <p class="text-[10px] font-black text-slate-400 uppercase">Words</p>
                        </div>
                        <div class="w-px h-8 bg-slate-100"></div>
                        <div class="text-center">
                            <p class="text-2xl font-extrabold text-slate-800" id="stat-chars">0</p>
                            <p class="text-[10px] font-black text-slate-400 uppercase">Chars</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeText() {
            const text = document.getElementById('text-input').value;
            const num = document.getElementById('num-sentences').value;
            if (text.length < 50) return alert("Please provide more text for analysis.");

            toggleLoading(true);
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, num_sentences: num })
                });
                const data = await response.json();
                displayResults(data);
            } catch (e) {
                alert("Server error. Please check your terminal.");
            } finally {
                toggleLoading(false);
            }
        }

        async function uploadFile(input) {
            const file = input.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('num_sentences', document.getElementById('num-sentences').value);

            toggleLoading(true);
            try {
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await response.json();
                displayResults(data);
            } catch (e) {
                alert("Upload failed.");
            } finally {
                toggleLoading(false);
            }
        }

        function displayResults(data) {
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            
            document.getElementById('summary-text').innerText = data.summary;
            document.getElementById('sentiment-label').innerText = data.sentiment.label;
            document.getElementById('stat-words').innerText = data.stats.word_count;
            document.getElementById('stat-chars').innerText = data.stats.char_count;
            document.getElementById('stat-time').innerText = data.stats.read_time_min;

            const kwList = document.getElementById('keywords-list');
            kwList.innerHTML = data.keywords.map(kw => `
                <span class="px-4 py-2 bg-gradient-to-r from-indigo-50 to-white text-indigo-600 rounded-xl text-xs font-bold border border-indigo-100">
                    #${kw}
                </span>
            `).join('');
        }

        function toggleLoading(isLoading) {
            const btn = document.getElementById('analyze-btn');
            const txt = document.getElementById('btn-text');
            btn.disabled = isLoading;
            txt.innerText = isLoading ? "Dreaming up summaries..." : "Generate Insights";
            btn.style.opacity = isLoading ? "0.7" : "1";
        }
    </script>
</body>
</html>
